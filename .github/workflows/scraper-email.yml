name: Scraper Alerts

on:
  schedule:
    # Run at minute 17 of every hour (UTC) to avoid top-of-hour queue congestion.
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    env:
      STATE_CACHE_VERSION: "5"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore state cache
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: scraper-state-${{ github.ref_name }}-${{ env.STATE_CACHE_VERSION }}-${{ github.run_number }}
          restore-keys: |
            scraper-state-${{ github.ref_name }}-${{ env.STATE_CACHE_VERSION }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scraper
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ vars.EMAIL_TO }}
        run: python scraper_AAshopping

      - name: Save state cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: scraper-state-${{ github.ref_name }}-${{ env.STATE_CACHE_VERSION }}-${{ github.run_number }}
